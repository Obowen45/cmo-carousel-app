<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospecting Carousel | VCCP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero-scroll">
  <section class="hero">
    <div class="hero-content">
      <img class="logo" id="logo" src="assets/vccp-logo.png" alt="VCCP">
      <h1 id="hero-title">Prospecting<br>Carousel</h1>
      <p class="tagline" id="hero-tagline">Tracking the leadership changes that open the door to a pitch — before anyone else notices.</p>
    </div>
    <div class="scroll-cue" id="scroll-cue" aria-hidden="true"></div>
    <div class="black-veil" id="black-veil"></div>
  </section>
</div>

<section class="section cta">
  <div class="radar-bg" aria-hidden="true">
    <div class="radar">
      <div class="radar-ring r1"></div>
      <div class="radar-ring r2"></div>
      <div class="radar-ring r3"></div>
      <div class="radar-ring r4"></div>
      <div class="radar-sweep"></div>
      <div class="radar-blip" style="top: 30%; left: 62%; animation-delay: 0s;"></div>
      <div class="radar-blip" style="top: 68%; left: 40%; animation-delay: 1.2s;"></div>
      <div class="radar-blip" style="top: 45%; left: 25%; animation-delay: 2.1s;"></div>
    </div>
  </div>
  <div class="reveal">
    <a class="cta-button" href="https://cmo-carousel-app-bvmca9wugstefc8kdfkatq.streamlit.app/">View the Live Radar</a>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
